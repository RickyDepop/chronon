__schema__.default.atlas_cc_claimcontact:
  - [id, string]
  - [contactid, string]
  - [claimid, string]
  - [record_begin_timestamp, timestamp]
  - [record_end_timestamp, timestamp]
  - [retired, int]
  - [ds, string]

default.atlas_cc_claimcontact:
  # One day after the initial contact versions so strict SCD2 bounds can observe
  # DOB as of the claim-contact link timestamp.
  - ["cc_1_minor_before_spine", "contact_minor_before_spine", "claim_1", !epoch 2025-01-02T00:00:00Z, null, 0, "2025-01-02"]
  - ["cc_1_minor_after_spine", "contact_minor_after_spine", "claim_1", !epoch 2025-01-02T00:00:00Z, null, 0, "2025-01-02"]
  - ["cc_1_stable_adult", "contact_stable_adult", "claim_1", !epoch 2025-01-02T00:00:00Z, null, 0, "2025-01-02"]
  - ["cc_2_minor_after_spine", "contact_minor_after_spine", "claim_2", !epoch 2025-01-02T00:00:00Z, null, 0, "2025-01-02"]
  - ["cc_3_minor_a", "contact_count_minor_a", "claim_3", !epoch 2025-01-02T00:00:00Z, null, 0, "2025-01-02"]
  - ["cc_3_minor_b", "contact_count_minor_b", "claim_3", !epoch 2025-01-02T00:00:00Z, null, 0, "2025-01-02"]
  - ["cc_3_retired_minor", "contact_count_retired_minor", "claim_3", !epoch 2025-01-02T00:00:00Z, null, 1, "2025-01-02"]

  # Counts before the link closes and stops counting after record_end_timestamp.
  - ["cc_4_ended_minor", "contact_ended_minor", "claim_4", !epoch 2025-01-02T00:00:00Z, !epoch 2025-01-15T00:00:00Z, 0, "2025-01-02"]

  # Active claim-contact rows whose contact should not count.
  - ["cc_5_retired_contact", "contact_retired_minor", "claim_5", !epoch 2025-01-02T00:00:00Z, null, 0, "2025-01-02"]
  - ["cc_6_null_dob", "contact_null_dob", "claim_6", !epoch 2025-01-02T00:00:00Z, null, 0, "2025-01-02"]
  - ["cc_6_missing_contact", "contact_missing_row", "claim_6", !epoch 2025-01-02T00:00:00Z, null, 0, "2025-01-02"]

  # Would count if the claim itself were not retired.
  - ["cc_retired_claim_minor", "contact_retired_claim_minor", "claim_retired", !epoch 2025-01-02T00:00:00Z, null, 0, "2025-01-02"]

