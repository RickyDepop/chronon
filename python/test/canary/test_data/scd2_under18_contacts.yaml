  - ["contact_count_retired_minor", "2013-01-01", !epoch 2025-01-01T00:00:00Z, null, 0, "2025-01-01"]
  - ["contact_ended_minor", "2010-01-01", !epoch 2025-01-01T00:00:00Z, null, 0, "2025-01-01"]
  - ["contact_retired_minor", "2010-01-01", !epoch 2025-01-01T00:00:00Z, null, 1, "2025-01-01"]
  - ["contact_null_dob", null, !epoch 2025-01-01T00:00:00Z, null, 0, "2025-01-01"]
