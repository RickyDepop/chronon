# Cross-cloud Hadoop FileSystem defaults.
#
# Each provider's FileSystem only activates when its scheme is referenced,
# so co-existing the AWS/GCP/Azure entries is safe. crucible-eks set the
# AWS pieces via helm `sparkDefaults.adminConf` (zipline-ai/crucible
# commit e5d453c); K8sSubmitter (in-cluster compute replacement for the
# Crucible HTTP gateway) bypasses that knob, so the conf moves here.

# AWS — UC + Iceberg metadata commonly come back as s3:// (not s3a://)
spark.hadoop.fs.s3.impl                              org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.AbstractFileSystem.s3.impl           org.apache.hadoop.fs.s3a.S3A

# GCP — gs:// for GCS
spark.hadoop.fs.gs.impl                              com.google.cloud.hadoop.fs.gcs.GoogleHadoopFileSystem
spark.hadoop.fs.AbstractFileSystem.gs.impl           com.google.cloud.hadoop.fs.gcs.GoogleHadoopFS

# Azure — abfs/abfss for ADLS Gen2 (hadoop-azure registers these by default
# but pin explicitly so the conf doesn't depend on auto-discovery)
spark.hadoop.fs.abfs.impl                            org.apache.hadoop.fs.azurebfs.AzureBlobFileSystem
spark.hadoop.fs.abfss.impl                           org.apache.hadoop.fs.azurebfs.SecureAzureBlobFileSystem
spark.hadoop.fs.AbstractFileSystem.abfs.impl         org.apache.hadoop.fs.azurebfs.Abfs
spark.hadoop.fs.AbstractFileSystem.abfss.impl        org.apache.hadoop.fs.azurebfs.Abfss
